# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build with Next.js
        run: npm run build
      - name: Diagnostics (Find Export)
        run: |
          echo "Checking current directory structure..."
          ls -F
          echo "Searching for index.html..."
          find . -name "index.html"
          if [ -d "out" ]; then
            echo "SUCCESS: 'out' directory found."
          else
            echo "ERROR: 'out' directory NOT found at root."
            # Attempt to find where it went
            POSSIBLE_OUT=$(find . -name "index.html" | head -n 1 | sed 's/\/index.html//')
            if [ -n "$POSSIBLE_OUT" ]; then
              echo "Found static export at: $POSSIBLE_OUT"
              cp -r "$POSSIBLE_OUT/." ./out-fix
              echo "Copied to ./out-fix"
            fi
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Use the discovered path or fall back to out-fix if created
          path: ${{ hashFiles('out-fix/index.html') != '' && './out-fix' || './out' }}

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
